name: Build and Deploy to GitHub Packages

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:password@localhost:5432/ax

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ax
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repository owner name
        run: |
          echo "IMAGE_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install Development Tools
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli,just

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Initialize Database and run migrations
        run: just init-db

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build and push Rust backend (tweet_server)
      # We use '--network host' to connect to postgres running on localhost:5432 for sqlx compilation
      - name: Build and push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tweet_server/Dockerfile
          push: true
          build-args: |
            DATABASE_URL=postgres://postgres:password@localhost:5432/ax
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/ax-backend:latest
          network: host

      # 2. Build and push Vite frontend
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/v1.1
          file: frontend/v1.1/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/ax-frontend:latest

      # 3. Build and push AI recommendation model server
      - name: Build and push Model-Server Image
        uses: docker/build-push-action@v6
        with:
          context: ./model_server
          file: model_server/Dockerfile
          push: true
          tags: ghcr.io/${{ env.IMAGE_OWNER }}/ax-model-server:latest
